<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Realtime Multiplayer - Triangle</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Overlay join dialog -->
  <div id="overlay" class="overlay">
    <div class="dialog">
      <h1 class="title">Masukkan Nama Player</h1>
      <input id="nameInput" class="nameInput" maxlength="24" autocomplete="off" placeholder="Nama Player" />
      <button id="okBtn" class="okBtn">OK</button>
      <div id="errorBox" class="errorBox" aria-live="polite"></div>
    </div>
  </div>

  <!-- UI (optional) -->
  <div id="hud" class="hud" aria-hidden="true">
    <div id="countText"></div>
  </div>

  <!-- Floating chat toggle -->
  <button id="chatToggle" class="chatToggle" type="button" aria-label="Buka panel chat" title="Chat">
    <!-- Chat bubble icon (inline SVG) -->
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M4 4.8C4 3.8 4.8 3 5.8 3h12.4C19.2 3 20 3.8 20 4.8v11.4c0 1-.8 1.8-1.8 1.8H9l-4.2 3v-3H5.8c-1 0-1.8-.8-1.8-1.8V4.8z" fill="currentColor"/>
      <path d="M7.2 8.2h9.6M7.2 12h6.4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
  </button>

  <!-- Chat panel -->
  <section id="chatPanel" class="chatPanel" aria-hidden="true">
    <header class="chatHeader">
      <div class="chatTitle">Chat</div>
      <button id="chatClose" class="chatClose" type="button" aria-label="Tutup chat">✕</button>
    </header>

    <div id="chatHistory" class="chatHistory" role="log" aria-live="polite"></div>

    <form id="chatForm" class="chatForm" autocomplete="off">
      <input id="chatInput" class="chatInput" type="text" maxlength="240" placeholder="Ketik pesan..." />
      <button id="chatSend" class="chatSend" type="submit">Kirim</button>
    </form>
  </section>


  <!-- Canvas for game -->
  <canvas id="gameCanvas" class="gameCanvas"></canvas>

  <!-- Virtual joystick (hidden on PC) -->
  <div id="joystick" class="joystick" aria-label="Virtual Joystick">
    <div id="joyBase" class="joy-base"></div>
    <div id="joyKnob" class="joy-knob"></div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/client.js" defer></script>
</body>
</html>
